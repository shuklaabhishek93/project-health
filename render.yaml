databases:
  - name: project-health-db
    plan: free
    databaseName: health_tracker
    user: health_user

services:
  - type: web
    name: project-health
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: project-health-db
          property: connectionString
    autoDeploy: true
